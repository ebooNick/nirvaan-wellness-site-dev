<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nirvaan Wellness</title>
  <meta name="description" content="Nirvaan Wellness — Connect to Your Inner Self. Massages, holistic rituals, skin care and body treatments in Providence, Seychelles." />
  <meta name="author" content="Upper Deck Studio" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- Designed & built by Upper Deck Studio · A388 -->
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <header class="site-header" id="site-header">
    <a href="#home" class="brand">
      <img src="../assets/logo.png" alt="Nirvaan Wellness" class="brand-logo" />
    </a>
    <nav class="main-nav" id="main-nav">
      <ul id="nav-links"></ul>
    </nav>
    <div class="header-right">
      <a href="#" class="header-cta" id="header-cta" target="_blank" rel="noopener">Book a Treatment</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>
  <div class="nav-backdrop" id="nav-backdrop"></div>

  <section class="hero" id="home">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <img src="../assets/logo.png" alt="Nirvaan Wellness" class="hero-logo" />
      <div class="hero-rule"></div>
      <p class="hero-tagline" id="hero-tagline"></p>
      <a href="#" class="btn-hero" id="hero-cta" target="_blank" rel="noopener">Book a Treatment</a>
      <p class="hero-secondary" id="hero-secondary"></p>
    </div>
  </section>

  <section class="manifesto" id="manifesto">
    <div class="manifesto-rule"></div>
    <blockquote class="manifesto-quote" id="manifesto-quote"></blockquote>
    <div class="manifesto-rule"></div>
  </section>

  <section class="philosophy" id="philosophy">
    <div class="container">
      <p class="section-label">Philosophy</p>
      <h2 id="philosophy-heading"></h2>
    </div>
    <div class="philosophy-image">
      <img id="philosophy-img" src="" alt="Meditation at sunrise" loading="lazy" />
    </div>
    <div class="container">
      <div class="philosophy-text" id="philosophy-paragraphs"></div>
    </div>
  </section>

  <section class="virtues-intro" id="virtues">
    <div class="container">
      <p class="section-label">Our Services</p>
      <h2 class="virtues-heading" id="virtues-heading"></h2>
      <p class="virtues-intro-text" id="virtues-intro-text"></p>
      <nav class="chapter-nav" id="chapter-nav"></nav>
    </div>
  </section>

  <div id="service-chapters"></div>

  <section class="policies" id="policies">
    <div class="container">
      <p class="section-label">Good to Know</p>
      <h2>Good to Know</h2>
      <div class="policies-grid" id="policies-list"></div>
    </div>
  </section>

  <section class="contact" id="contact">
    <div class="contact-bg" id="contact-bg"></div>
    <div class="contact-overlay"></div>
    <div class="container contact-inner">
      <p class="section-label section-label--light">Visit Us</p>
      <h2 class="contact-heading">Visit Us</h2>
      <div class="contact-grid">
        <div class="contact-col">
          <h3>Opening Hours</h3>
          <table class="hours-table" id="hours-table"></table>
        </div>
        <div class="contact-col">
          <h3>Get in Touch</h3>
          <ul class="contact-details" id="contact-details"></ul>
          <div class="contact-actions" id="contact-actions"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <img src="../assets/logo.png" alt="Nirvaan Wellness" class="footer-logo" loading="lazy" />
      <div class="footer-rule"></div>
      <p id="footer-text"></p>
    </div>
  </footer>

  <div class="fab" id="fab"></div>

  <script>
    window.NIRVAAN_LAYOUT  = 'table';
    window.NIRVAAN_CONTENT = '../content.json';
    window.NIRVAAN_BASE    = '../';
  </script>
  <script src="../app.js"></script>
</body>
</html>
